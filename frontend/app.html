<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBVV | Início</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/forca.css">
    <link rel="stylesheet" href="./styles/jornada.css">
    <link rel="stylesheet" href="./styles/eclipse.css">
    <link rel="stylesheet" href="./styles/espada.css">
    <link rel="stylesheet" href="./styles/proposito.css">
    <link rel="stylesheet" href="./styles/global.css">
</head>
<body>
  <div id="app">

    <div id="sidebar">
      <div class="div-perfil">
        <div class="foto-frame">
          <img class="foto-perfil" src="./assets/perfis/Berserk-Helmet.jpg" alt="Foto de perfil">
        </div>
        <h2 class="cinzel-decorative-bold">Olá, <span class="cinzel-decorative-bold" id="user-name">Usuário</span>!</h2>
        <button id="logout-button"><img class="exit-btn" src="./assets/buttons/exit.png" alt="Sair"></button>
      </div>
      <div class="div-button">
        <button class="medievalsharp-regular metal-button" id="forca-button">Força</button>
        <button class="medievalsharp-regular metal-button" id="jornada-button">Jornada</button>
        <button class="medievalsharp-regular metal-button" id="eclipse-button">Demônios</button>
        <button class="medievalsharp-regular metal-button" id="espada-button">Mente</button>
        <button class="medievalsharp-regular metal-button" id="proposito-button">Propósito</button>
      </div>
    </div>

    <div class="toast hidden" id="toast"></div>
    
    <main id="content"></main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
