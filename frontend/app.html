<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBVV | Início</title>
    <link rel="stylesheet" href="./styles/global.css">
</head>
<body>
  <div id="app">

    <div id="sidebar">
      <div class="div-perfil">
        <img src="./assets/perfil.png" alt="Foto de perfil">
        <h2>Olá, <span id="user-name">Usuário</span>!</h2>
        <button id="logout-button">Sair</button>
      </div>
      <div class="div-button">
        <button id="forca-button">Força</button>
        <button id="jornada-button">Jornada</button>
        <button id="mao-de-deus-button">Demônios</button>
        <button id="caminho-da-espada-button">Mente</button>
        <button id="proposito-button">Propóstio</button>
      </div>
    </div>

    <main id="content" class="teste">

      <div class="conteudo">
        <div class="cabecalhos">
          <h1>Nível de força: <span id="nivel-de-forca">0</span></h1>
          <h2>Sequência: <span id="sequencia">0</span><span> dias</span></h2>
        </div>
        <div class="corpo">
          
        </div>
      </div>

    </main>

  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
